<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8C23A"/>
      <stop offset="100%" stop-color="#C66526"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Smog wisps -->
  <ellipse cx="16" cy="7.5" rx="7.5" ry="2.2" fill="white" opacity="0.18"/>
  <ellipse cx="9.5" cy="5.5" rx="4" ry="1.6" fill="white" opacity="0.13"/>
