  <circle cx="11.5" cy="13" r="2.4" fill="white" opacity="0.95"/>
  <circle cx="20.5" cy="13" r="2.4" fill="white" opacity="0.95"/>
  <circle cx="12.3" cy="13.5" r="1.2" fill="#1A1A2E"/>
  <circle cx="21.3" cy="13.5" r="1.2" fill="#1A1A2E"/>
